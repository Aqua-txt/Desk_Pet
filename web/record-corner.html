<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樱小宠 · 记录被忽视角落</title>
  <style>
    :root {
      --bg: #fff9ef;
      --bg-soft: #fff3dc;
      --card: rgba(255, 255, 255, 0.86);
      --line: rgba(210, 171, 109, 0.26);
      --text: #4c3720;
      --muted: #8d7251;
      --accent: #d59a44;
      --accent-strong: #bf7d24;
      --good: #7cad63;
      --rose: #e2a67d;
      --shadow: 0 14px 30px rgba(180, 132, 67, 0.14);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 460px at -10% -10%, rgba(255, 229, 176, 0.65), transparent 66%),
        radial-gradient(700px 360px at 110% 110%, rgba(255, 220, 169, 0.35), transparent 60%),
        linear-gradient(170deg, var(--bg), var(--bg-soft));
    }

    .header {
      background: linear-gradient(135deg, #7cad63, #5a8a3f);
      color: white;
      padding: 28px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 24px rgba(92, 138, 63, 0.25);
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.5px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.25);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 10px 20px;
      border-radius: 11px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }

    .wrap {
      width: min(1180px, 93vw);
      margin: 26px auto 42px;
      display: grid;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .campus-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .campus-bg .campus-art {
      position: absolute;
      max-width: none;
      height: auto;
      mix-blend-mode: multiply;
      filter: sepia(1) hue-rotate(60deg) saturate(0.55) brightness(1.08) contrast(0.84);
    }

    .campus-top {
      width: min(960px, 92vw);
      right: -130px;
      top: 8px;
      opacity: 0.26;
    }

    .campus-mid {
      width: min(760px, 76vw);
      left: -70px;
      top: 33vh;
      opacity: 0.22;
    }

    .campus-bottom {
      width: min(1020px, 98vw);
      left: -160px;
      bottom: -36px;
      opacity: 0.20;
    }

    .campus-side {
      width: min(540px, 56vw);
      right: -120px;
      top: 48vh;
      opacity: 0.16;
      transform: rotate(-2deg);
    }

    .campus-watermark {
      position: fixed;
      right: 24px;
      bottom: 14px;
      z-index: 1;
      color: rgba(74, 107, 56, 0.35);
      font-size: 12px;
      letter-spacing: 0.9px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 18px;
      font-size: 20px;
      color: var(--good);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .intro-text {
      background: linear-gradient(145deg, rgba(232, 245, 223, 0.85), rgba(214, 238, 196, 0.72));
      border: 1px solid rgba(124, 173, 99, 0.3);
      border-radius: 14px;
      padding: 18px;
      line-height: 1.75;
      font-size: 15px;
      color: #4a6b38;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--accent-strong);
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(213, 154, 68, 0.3);
      border-radius: 11px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.85);
      transition: all 0.2s ease;
      color: var(--text);
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(213, 154, 68, 0.15);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.6;
    }

    .submit-btn {
      background: linear-gradient(120deg, #7cad63, #5a8a3f);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(124, 173, 99, 0.25);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(124, 173, 99, 0.35);
      filter: brightness(1.05);
    }

    .records-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 500px;
      overflow-y: auto;
      display: grid;
      gap: 14px;
    }

    .record-item {
      border: 1px solid rgba(124, 173, 99, 0.25);
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(248, 250, 242, 0.82));
      padding: 18px;
      transition: all 0.2s ease;
    }

    .record-item:hover {
      border-color: rgba(124, 173, 99, 0.45);
      transform: translateX(4px);
    }

    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .record-location {
      font-size: 17px;
      font-weight: 700;
      color: var(--good);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .record-category {
      background: rgba(124, 173, 99, 0.18);
      color: #4a6b38;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .record-time {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .record-content {
      line-height: 1.7;
      font-size: 14px;
      color: var(--text);
    }

    .record-feeling {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed rgba(210, 171, 109, 0.3);
      font-style: italic;
      color: var(--rose);
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .stat-item {
      background: linear-gradient(145deg, rgba(232, 245, 223, 0.82), rgba(214, 238, 196, 0.68));
      border: 1px solid rgba(124, 173, 99, 0.25);
      border-radius: 12px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-item .num {
      font-size: 24px;
      font-weight: 700;
      color: var(--good);
    }

    .stat-item .label {
      font-size: 13px;
      color: var(--muted);
    }

    .success-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: linear-gradient(135deg, #7cad63, #5a8a3f);
      color: white;
      padding: 24px 40px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .success-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @media (max-width: 980px) {
      .header h1 { font-size: 22px; }
      .stats-bar { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="campus-bg" aria-hidden="true">
    <img class="campus-art campus-top" src="../989e301b-5b69-49cd-ab7f-c58d8e046aac (1).svg" alt="">
    <img class="campus-art campus-mid" src="../04591c9c-f260-4c7d-a2ef-1740ab62fe83 (1).svg" alt="">
    <img class="campus-art campus-bottom" src="../b7844486-faf7-486f-901f-8ec7ffb7980c (1).svg" alt="">
    <img class="campus-art campus-side" src="../40958298-b788-4157-8ece-4ade4c787752 (1).svg" alt="">
  </div>

  <div class="campus-watermark">WUHAN UNIVERSITY · CAMPUS LINE ART</div>

  <div class="header">
    <h1>📍 记录被忽视角落</h1>
    <a class="back-btn" href="index.html">← 返回主页</a>
  </div>

  <main class="wrap">
    <section class="card">
      <h2>✨ 发现武大的隐秘角落</h2>
      <div class="intro-text">
        在武汉大学，总有一些角落被匆忙的脚步忽略。它们可能是一棵老树、一面斑驳的墙、一个安静的读书角，或者一段只有少数人知道的小路。<br><br>
        用你的眼睛去发现，用文字去记录。每一次角落记录，都是对这个世界的一次重新认识。
        <strong>+10 经验值</strong>
      </div>

      <form id="cornerForm">
        <div class="form-group">
          <label for="location">📍 角落位置</label>
          <input type="text" id="location" placeholder="例如：老图书馆后面的银杏树" required>
        </div>

        <div class="form-group">
          <label for="category">🏷️ 角落类型</label>
          <select id="category" required>
            <option value="">请选择类型...</option>
            <option value="自然景观">🌿 自然景观</option>
            <option value="建筑空间">🏛️ 建筑空间</option>
            <option value="人文气息">📚 人文气息</option>
            <option value="生活痕迹">☕ 生活痕迹</option>
            <option value="其他发现">💡 其他发现</option>
          </select>
        </div>

        <div class="form-group">
          <label for="observation">📝 你的观察与想法</label>
          <textarea id="observation" placeholder="描述你在这个角落看到了什么？它给你什么感觉？你为什么觉得它被忽视了？" required></textarea>
        </div>

        <div class="form-group">
          <label for="feeling">💭 此刻心情/感悟（可选）</label>
          <input type="text" id="feeling" placeholder="一句话描述此刻的感受...">
        </div>

        <button type="submit" class="submit-btn">✅ 记录这个角落 (+10 经验)</button>
      </form>
    </section>

    <section class="card">
      <h2>📖 我的角落记录</h2>
      <div class="stats-bar">
        <div class="stat-item">
          <span class="num" id="totalRecords">0</span>
          <span class="label">条记录</span>
        </div>
        <div class="stat-item">
          <span class="num" id="totalExp">0</span>
          <span class="label">累计经验</span>
        </div>
      </div>
      <ul class="records-list" id="recordsList"></ul>
    </section>
  </main>

  <div class="success-toast" id="toast">✓ 记录成功！+10 经验值</div>

  <script>
    const storeKey = "desk_pet_web_demo_state";
    const cornerStoreKey = "desk_pet_corner_records";

    function loadState() {
      try {
        const raw = localStorage.getItem(storeKey);
        if (!raw) return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
        return JSON.parse(raw);
      } catch (_) {
        return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
      }
    }

    function saveState(state) {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function loadCornerRecords() {
      try {
        const raw = localStorage.getItem(cornerStoreKey);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch (_) {
        return [];
      }
    }

    function saveCornerRecords(records) {
      localStorage.setItem(cornerStoreKey, JSON.stringify(records));
    }

    function renderRecords() {
      const records = loadCornerRecords();
      const state = loadState();

      document.getElementById('totalRecords').textContent = records.length;
      document.getElementById('totalExp').textContent = records.length * 10;

      const list = document.getElementById('recordsList');
      list.innerHTML = '';

      if (records.length === 0) {
        list.innerHTML = `
          <li class="empty-state">
            <div class="icon">🔍</div>
            <p>还没有记录任何角落</p>
            <p style="font-size:13px;margin-top:8px;">去武大校园走走，发现那些被忽视的美好吧！</p>
          </li>
        `;
        return;
      }

      records.slice().reverse().forEach(record => {
        const li = document.createElement('li');
        li.className = 'record-item';
        li.innerHTML = `
          <div class="record-header">
            <span class="record-location">📍 ${record.location}</span>
            <span class="record-category">${record.category}</span>
          </div>
          <div class="record-time">🕐 ${record.time}</div>
          <div class="record-content">${record.observation}</div>
          ${record.feeling ? `<div class="record-feeling">"${record.feeling}"</div>` : ''}
        `;
        list.appendChild(li);
      });
    }

    document.getElementById('cornerForm').addEventListener('submit', (e) => {
      e.preventDefault();

      const location = document.getElementById('location').value.trim();
      const category = document.getElementById('category').value;
      const observation = document.getElementById('observation').value.trim();
      const feeling = document.getElementById('feeling').value.trim();

      if (!location || !category || !observation) return;

      const record = {
        location,
        category,
        observation,
        feeling,
        time: new Date().toLocaleString('zh-CN', { hour12: false })
      };

      const records = loadCornerRecords();
      records.push(record);
      saveCornerRecords(records);

      const state = loadState();
      state.exp += 10;
      state.streak += 1;
      state.cornerCount += 1;
      const stamp = new Date().toLocaleString("zh-CN", { hour12: false });
      state.logs.push(`[${stamp}] 发现了新角落「${location}」，经验 +10`);
      state.logs = state.logs.slice(-26);
      saveState(state);

      document.getElementById('cornerForm').reset();
      renderRecords();

      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });

    renderRecords();
  </script>
</body>
</html>
