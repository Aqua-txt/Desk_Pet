<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樱小宠 · 热爱打卡</title>
  <style>
    :root {
      --bg: #fff9ef;
      --bg-soft: #fff3dc;
      --card: rgba(255, 255, 255, 0.9);
      --line: rgba(210, 171, 109, 0.3);
      --text: #4c3720;
      --muted: #8d7251;
      --accent: #d59a44;
      --accent-strong: #bf7d24;
      --heart-red: #e74c3c;
      --heart-pink: #ff6b9d;
      --shadow: 0 14px 30px rgba(180, 132, 67, 0.14);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 460px at -10% -10%, rgba(255, 229, 176, 0.65), transparent 66%),
        radial-gradient(700px 360px at 110% 110%, rgba(255, 220, 169, 0.35), transparent 60%),
        linear-gradient(170deg, var(--bg), var(--bg-soft));
    }

    .header {
      height: 74px;
      background: linear-gradient(135deg, var(--heart-pink), var(--heart-red));
      color: white;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 24px rgba(231, 76, 60, 0.25);
      position: relative;
      z-index: 4;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.5px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.25);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 9px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }

    .campus-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .campus-bg .campus-art {
      position: absolute;
      max-width: none;
      height: auto;
      mix-blend-mode: multiply;
      filter: sepia(1) hue-rotate(-20deg) saturate(0.55) brightness(1.08) contrast(0.84);
    }

    .campus-top {
      width: min(900px, 88vw);
      right: -140px;
      top: 2px;
      opacity: 0.25;
    }

    .campus-mid {
      width: min(700px, 72vw);
      left: -70px;
      top: 36vh;
      opacity: 0.2;
    }

    .campus-bottom {
      width: min(980px, 96vw);
      left: -180px;
      bottom: -50px;
      opacity: 0.18;
    }

    .campus-watermark {
      position: fixed;
      right: 22px;
      bottom: 12px;
      z-index: 1;
      color: rgba(180, 80, 80, 0.3);
      font-size: 12px;
      letter-spacing: 0.9px;
    }

    .wrap {
      width: min(1240px, 95vw);
      height: calc(100vh - 90px);
      margin: 8px auto;
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
      padding: 14px 16px;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 17px;
      color: var(--heart-red);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkin-card {
      gap: 8px;
    }

    .streak-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .mini-kpi {
      background: linear-gradient(145deg, rgba(255, 240, 245, 0.88), rgba(255, 228, 235, 0.75));
      border: 1px solid rgba(231, 76, 60, 0.2);
      border-radius: 11px;
      padding: 8px 10px;
      text-align: center;
    }

    .mini-kpi .value {
      font-size: 24px;
      font-weight: 800;
      color: var(--heart-red);
      line-height: 1.05;
    }

    .mini-kpi .label {
      font-size: 12px;
      color: var(--muted);
    }

    .checkin-form {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      align-content: start;
      min-height: 0;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-wide {
      grid-column: 1 / -1;
    }

    .field label {
      font-weight: 600;
      font-size: 12px;
      color: var(--heart-red);
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(231, 76, 60, 0.25);
      border-radius: 9px;
      font-size: 13px;
      font-family: inherit;
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
    }

    .field textarea {
      min-height: 62px;
      max-height: 78px;
      resize: none;
      line-height: 1.45;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: var(--heart-red);
      box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.1);
    }

    .preview-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .image-preview {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid rgba(231, 76, 60, 0.25);
      object-fit: cover;
      display: none;
      box-shadow: 0 4px 10px rgba(192, 125, 42, 0.15);
      transform: rotate(-4deg);
    }

    .checkin-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--heart-pink), var(--heart-red));
      cursor: pointer;
      box-shadow: 0 8px 22px rgba(231, 76, 60, 0.28);
      transition: all 0.2s ease;
    }

    .checkin-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .checkin-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .calendar-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1.3fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .calendar-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .calendar-head {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.8;
    }

    .calendar-day {
      position: relative;
      min-height: 34px;
      border-radius: 9px;
      border: 1px solid rgba(213, 154, 68, 0.2);
      background: rgba(255, 252, 245, 0.86);
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 3px 4px;
      color: var(--muted);
    }

    .calendar-day.empty {
      border: none;
      background: transparent;
    }

    .calendar-day.checked {
      background: linear-gradient(145deg, rgba(255, 199, 216, 0.8), rgba(255, 229, 188, 0.88));
      color: #7f2d1f;
    }

    .calendar-day.today {
      box-shadow: inset 0 0 0 2px rgba(213, 154, 68, 0.5);
    }

    .calendar-day.selected {
      box-shadow: inset 0 0 0 2px rgba(231, 76, 60, 0.65);
    }

    .pet-badge {
      position: absolute;
      right: 2px;
      bottom: 2px;
      width: 16px;
      height: 16px;
      border-radius: 5px;
      object-fit: cover;
      transform: rotate(-8deg);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 2px 6px rgba(180, 104, 56, 0.25);
      pointer-events: none;
    }

    .calendar-tip {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .stat-box {
      background: linear-gradient(145deg, rgba(255, 240, 245, 0.84), rgba(255, 228, 235, 0.74));
      border: 1px solid rgba(231, 76, 60, 0.2);
      border-radius: 11px;
      padding: 10px;
      text-align: center;
    }

    .stat-box .value {
      font-size: 23px;
      font-weight: 800;
      color: var(--heart-red);
      line-height: 1.1;
    }

    .stat-box .label {
      font-size: 12px;
      color: var(--muted);
    }

    .stats-note {
      border: 1px dashed rgba(213, 154, 68, 0.45);
      border-radius: 11px;
      background: rgba(255, 248, 230, 0.7);
      padding: 10px;
      font-size: 13px;
      line-height: 1.5;
      color: #7a5a34;
      min-height: 54px;
    }

    .history-toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .history-toolbar button {
      border: 1px solid rgba(213, 154, 68, 0.35);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 700;
      color: #8a6436;
      background: rgba(255, 244, 220, 0.8);
      cursor: pointer;
    }

    .history-toolbar button.active {
      color: white;
      border-color: transparent;
      background: linear-gradient(120deg, #e08f67, #c57341);
    }

    .freq-cloud {
      position: relative;
      flex: 1;
      min-height: 0;
      border: 1px dashed rgba(231, 76, 60, 0.25);
      border-radius: 12px;
      background: linear-gradient(155deg, rgba(255, 251, 243, 0.92), rgba(255, 242, 228, 0.88));
      overflow: hidden;
      font-family: "STKaiti", "KaiTi", "FangSong", serif;
    }

    .cloud-word {
      position: absolute;
      color: #7b4f2f;
      line-height: 1;
      user-select: none;
      white-space: nowrap;
      text-shadow: 0 2px 6px rgba(255, 255, 255, 0.6);
    }

    .cloud-sticker {
      position: absolute;
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 5px 10px rgba(183, 123, 60, 0.22);
    }

    .cloud-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    .pet-toast {
      position: fixed;
      top: 86px;
      left: 14px;
      z-index: 10;
      max-width: 320px;
      border: 1px solid rgba(231, 76, 60, 0.25);
      border-radius: 13px;
      background: linear-gradient(140deg, rgba(255, 245, 234, 0.95), rgba(255, 229, 235, 0.95));
      box-shadow: 0 10px 22px rgba(186, 120, 60, 0.2);
      padding: 9px 11px;
      display: none;
      gap: 10px;
      align-items: center;
    }

    .pet-toast.show {
      display: flex;
      animation: toastIn 0.35s ease;
    }

    .pet-toast img {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      transform: rotate(-6deg);
    }

    .pet-toast strong {
      display: block;
      font-size: 13px;
      color: #9a3f28;
      margin-bottom: 2px;
    }

    .pet-toast span {
      font-size: 12px;
      line-height: 1.45;
      color: #7d5b38;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 12;
    }

    @media (max-width: 1120px) {
      body {
        height: auto;
        overflow: auto;
      }
      .wrap {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }
    }
  </style>
</head>
<body>
  <div class="campus-bg" aria-hidden="true">
    <img class="campus-art campus-top" src="../989e301b-5b69-49cd-ab7f-c58d8e046aac (1).svg" alt="">
    <img class="campus-art campus-mid" src="../04591c9c-f260-4c7d-a2ef-1740ab62fe83 (1).svg" alt="">
    <img class="campus-art campus-bottom" src="../b7844486-faf7-486f-901f-8ec7ffb7980c (1).svg" alt="">
  </div>
  <div class="campus-watermark">WUHAN UNIVERSITY · CAMPUS LINE ART</div>

  <header class="header">
    <h1>💝 热爱打卡</h1>
    <a class="back-btn" href="index.html">← 返回主页</a>
  </header>

  <div class="pet-toast" id="petToast">
    <img id="petToastIcon" alt="桌宠提示">
    <div>
      <strong id="petToastTitle">樱小宠提示</strong>
      <span id="petToastText"></span>
    </div>
  </div>

  <main class="wrap">
    <section class="card checkin-card">
      <h2>🔥 坚持热爱，见证成长</h2>
      <div class="streak-row">
        <div class="mini-kpi">
          <div class="value" id="streakNow">0</div>
          <div class="label">当前连击</div>
        </div>
        <div class="mini-kpi">
          <div class="value" id="streakMax">0</div>
          <div class="label">历史最长</div>
        </div>
        <div class="mini-kpi">
          <div class="value" id="checkinTodayState">待打卡</div>
          <div class="label">今日状态</div>
        </div>
      </div>

      <form class="checkin-form" id="checkinForm">
        <div class="field">
          <label for="passionName">热爱项目</label>
          <input id="passionName" type="text" placeholder="如：跑步、编程、摄影">
        </div>
        <div class="field">
          <label for="duration">投入时长</label>
          <select id="duration">
            <option value="15min">15分钟以内</option>
            <option value="30min" selected>15-30分钟</option>
            <option value="1hour">30分钟-1小时</option>
            <option value="2hour+">1小时以上</option>
          </select>
        </div>
        <div class="field">
          <label for="checkinDate">打卡日期</label>
          <input id="checkinDate" type="date">
        </div>
        <div class="field">
          <label for="imageUpload">打卡配图（可选）</label>
          <div class="preview-row">
            <input id="imageUpload" type="file" accept="image/*">
            <img id="imagePreview" class="image-preview" alt="预览图">
          </div>
        </div>
        <div class="field field-wide">
          <label for="checkinContent">打卡内容</label>
          <textarea id="checkinContent" placeholder="记录今天做了什么、有什么收获或感受..."></textarea>
        </div>
        <div class="field field-wide" style="align-items:flex-end;">
          <button type="submit" class="checkin-btn" id="submitBtn">❤️ 确认打卡（+10 EXP）</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>📅 打卡日历</h2>
      <div class="calendar-controls">
        <select id="yearSelect"></select>
        <select id="monthSelect"></select>
        <input id="dayPicker" type="date">
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="calendar-tip" id="calendarTip">已打卡日期会带桌宠贴纸。</div>
    </section>

    <section class="card">
      <h2>📊 打卡统计</h2>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="value" id="totalCheckins">0</div>
          <div class="label">总打卡次数</div>
        </div>
        <div class="stat-box">
          <div class="value" id="totalExp">0</div>
          <div class="label">累计经验值</div>
        </div>
        <div class="stat-box">
          <div class="value" id="monthCheckins">0</div>
          <div class="label">当月打卡数</div>
        </div>
        <div class="stat-box">
          <div class="value" id="consistency">0%</div>
          <div class="label">月度坚持率</div>
        </div>
        <div class="stat-box">
          <div class="value" id="imageCount">0</div>
          <div class="label">上传图片数</div>
        </div>
        <div class="stat-box">
          <div class="value" id="contentAvg">0</div>
          <div class="label">平均字数</div>
        </div>
      </div>
      <div class="stats-note" id="statsNote">保持连续打卡，你的成长轨迹会越来越清晰。</div>
    </section>

    <section class="card">
      <h2>🧠 关键词频率图</h2>
      <div class="history-toolbar">
        <button type="button" data-range="month" class="active">最近一个月</button>
        <button type="button" data-range="year">最近一年</button>
      </div>
      <div class="freq-cloud" id="freqCloud"></div>
    </section>
  </main>

  <canvas class="confetti" id="confetti"></canvas>

  <script>
    const storeKey = "desk_pet_web_demo_state";
    const checkinStoreKey = "desk_pet_checkin_records";
    const STOP_WORDS = new Set(["今天", "自己", "因为", "然后", "一下", "非常", "这个", "那个", "我们", "你们", "他们", "热爱", "打卡", "坚持", "记录", "完成", "进行", "感觉", "一个", "一些"]);
    const CHECKIN_API_ENDPOINTS = ["/api/passion-checkins", "http://127.0.0.1:8765/api/passion-checkins"];
    const TOAST_MESSAGES = [
      "你不是在重复小事，你是在锻造稳定的自己。",
      "今天也在发光，别小看这次打卡。",
      "每一份坚持都在替未来的你铺路。",
      "樱小宠看见你了：行动力又+1！",
      "稳住节奏，你已经比昨天更强。"
    ];

    const petStickerSvgs = [
      createPetSvg("#ffc4d3", "#f299b3"),
      createPetSvg("#ffe1af", "#f5bf6a"),
      createPetSvg("#ffd8b4", "#f4a45b"),
      createPetSvg("#ffd2e6", "#f189c3")
    ];

    let selectedDate = getTodayStr();
    let selectedCloudRange = "month";
    let latestImageData = "";
    let toastTimer = null;
    let toastInterval = null;

    function createPetSvg(mainColor, earColor) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80"><rect x="4" y="4" width="72" height="72" rx="16" fill="${mainColor}"/><circle cx="27" cy="30" r="8" fill="${earColor}"/><circle cx="53" cy="30" r="8" fill="${earColor}"/><circle cx="40" cy="42" r="20" fill="#fff6f3"/><circle cx="33" cy="41" r="2.8" fill="#7d4f3a"/><circle cx="47" cy="41" r="2.8" fill="#7d4f3a"/><path d="M34 50c4 4 8 4 12 0" stroke="#7d4f3a" stroke-width="2.8" fill="none" stroke-linecap="round"/></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function getTodayStr() {
      return new Date().toISOString().split("T")[0];
    }

    function toDate(value) {
      return new Date(`${value}T00:00:00`);
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(storeKey);
        if (!raw) return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
        return JSON.parse(raw);
      } catch (_) {
        return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
      }
    }

    function saveState(state) {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function normalizeCheckin(item) {
      return {
        id: item.id || `${item.date || getTodayStr()}-${item.time || Date.now()}`,
        date: item.date || getTodayStr(),
        time: item.time || new Date().toLocaleString("zh-CN", { hour12: false }),
        passion: item.passion || item.passionName || "未命名热爱",
        duration: item.duration || "30min",
        durationLabel: item.durationLabel || "15-30分钟",
        content: item.content || item.note || "",
        imageData: item.imageData || ""
      };
    }

    function loadCheckins() {
      try {
        const raw = localStorage.getItem(checkinStoreKey);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map(normalizeCheckin);
      } catch (_) {
        return [];
      }
    }

    function saveCheckins(list) {
      localStorage.setItem(checkinStoreKey, JSON.stringify(list));
    }

    async function fetchServerCheckins() {
      const local = loadCheckins();
      for (const endpoint of CHECKIN_API_ENDPOINTS) {
        try {
          const response = await fetch(endpoint, { cache: "no-store" });
          if (!response.ok) continue;
          const payload = await response.json();
          const data = Array.isArray(payload?.data) ? payload.data.map(normalizeCheckin) : [];
          if (data.length || local.length === 0) {
            saveCheckins(data);
            return data;
          }
          return local;
        } catch (_) {
        }
      }
      return local;
    }

    async function postCheckinToServer(record) {
      for (const endpoint of CHECKIN_API_ENDPOINTS) {
        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ record })
          });
          if (!response.ok) continue;
          const payload = await response.json();
          const data = Array.isArray(payload?.data) ? payload.data.map(normalizeCheckin) : [];
          saveCheckins(data);
          return data;
        } catch (_) {
        }
      }
      return null;
    }

    function existsCheckin(dateStr) {
      return loadCheckins().some((item) => item.date === dateStr);
    }

    function getDurationLabel(value) {
      const map = {
        "15min": "15分钟以内",
        "30min": "15-30分钟",
        "1hour": "30分钟-1小时",
        "2hour+": "1小时以上"
      };
      return map[value] || "15-30分钟";
    }

    function calcStreak(checkins) {
      const dates = [...new Set(checkins.map((i) => i.date))].sort();
      if (!dates.length) return { now: 0, max: 0 };
      let max = 1;
      let run = 1;
      for (let i = 1; i < dates.length; i++) {
        const prev = toDate(dates[i - 1]);
        const curr = toDate(dates[i]);
        const diff = Math.round((curr - prev) / 86400000);
        if (diff === 1) {
          run += 1;
          max = Math.max(max, run);
        } else {
          run = 1;
        }
      }

      let now = 1;
      for (let i = dates.length - 1; i > 0; i--) {
        const curr = toDate(dates[i]);
        const prev = toDate(dates[i - 1]);
        if (Math.round((curr - prev) / 86400000) === 1) {
          now += 1;
        } else {
          break;
        }
      }
      const diffFromToday = Math.round((toDate(getTodayStr()) - toDate(dates[dates.length - 1])) / 86400000);
      if (diffFromToday > 1) now = 0;

      return { now, max };
    }

    function hashCode(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = (hash << 5) - hash + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function petForDate(dateStr) {
      const idx = hashCode(dateStr) % petStickerSvgs.length;
      return petStickerSvgs[idx];
    }

    function setupCalendarControls() {
      const ySel = document.getElementById("yearSelect");
      const mSel = document.getElementById("monthSelect");
      const now = new Date();
      const currentYear = now.getFullYear();
      for (let y = currentYear - 2; y <= currentYear + 2; y++) {
        const opt = document.createElement("option");
        opt.value = y;
        opt.textContent = `${y}年`;
        ySel.appendChild(opt);
      }
      for (let m = 1; m <= 12; m++) {
        const opt = document.createElement("option");
        opt.value = String(m);
        opt.textContent = `${m}月`;
        mSel.appendChild(opt);
      }
      ySel.value = String(currentYear);
      mSel.value = String(now.getMonth() + 1);
      document.getElementById("dayPicker").value = selectedDate;
      document.getElementById("checkinDate").value = selectedDate;
    }

    function renderCalendar() {
      const checkins = loadCheckins();
      const y = Number(document.getElementById("yearSelect").value);
      const m = Number(document.getElementById("monthSelect").value);
      const grid = document.getElementById("calendarGrid");
      grid.innerHTML = "";

      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];
      weekdays.forEach((name) => {
        const el = document.createElement("div");
        el.className = "calendar-head";
        el.textContent = name;
        grid.appendChild(el);
      });

      const firstDay = new Date(y, m - 1, 1).getDay();
      const daysInMonth = new Date(y, m, 0).getDate();
      const today = getTodayStr();

      for (let i = 0; i < firstDay; i++) {
        const blank = document.createElement("div");
        blank.className = "calendar-day empty";
        grid.appendChild(blank);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        const checked = checkins.some((c) => c.date === dateStr);
        const day = document.createElement("div");
        day.className = "calendar-day";
        if (checked) day.classList.add("checked");
        if (dateStr === today) day.classList.add("today");
        if (dateStr === selectedDate) day.classList.add("selected");
        day.textContent = String(d);
        day.title = checked ? "已打卡" : "未打卡";
        day.addEventListener("click", () => {
          selectedDate = dateStr;
          document.getElementById("dayPicker").value = dateStr;
          document.getElementById("checkinDate").value = dateStr;
          renderCalendar();
        });

        if (checked) {
          const badge = document.createElement("img");
          badge.className = "pet-badge";
          badge.src = petForDate(dateStr);
          badge.alt = "桌宠贴纸";
          day.appendChild(badge);
        }
        grid.appendChild(day);
      }

      const monthPrefix = `${y}-${String(m).padStart(2, "0")}`;
      const count = checkins.filter((c) => c.date.startsWith(monthPrefix)).length;
      document.getElementById("calendarTip").textContent = `${y}年${m}月已打卡 ${count} 次，点击任意日期可快速定位打卡日。`;
    }

    function renderStats() {
      const checkins = loadCheckins();
      const streak = calcStreak(checkins);
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth() + 1;
      const monthPrefix = `${y}-${String(m).padStart(2, "0")}`;
      const monthCheckins = checkins.filter((c) => c.date.startsWith(monthPrefix)).length;
      const daysInMonth = new Date(y, m, 0).getDate();
      const consistency = Math.round((monthCheckins / daysInMonth) * 100);
      const imageCount = checkins.filter((c) => !!c.imageData).length;
      const totalChars = checkins.reduce((sum, c) => sum + (c.content || "").length, 0);
      const avgChars = checkins.length ? Math.round(totalChars / checkins.length) : 0;

      document.getElementById("totalCheckins").textContent = String(checkins.length);
      document.getElementById("totalExp").textContent = String(checkins.length * 10);
      document.getElementById("monthCheckins").textContent = String(monthCheckins);
      document.getElementById("consistency").textContent = `${consistency}%`;
      document.getElementById("imageCount").textContent = String(imageCount);
      document.getElementById("contentAvg").textContent = String(avgChars);
      document.getElementById("streakNow").textContent = String(streak.now);
      document.getElementById("streakMax").textContent = String(streak.max);
      document.getElementById("checkinTodayState").textContent = existsCheckin(getTodayStr()) ? "已完成" : "待打卡";

      let note = "保持连续打卡，你的成长轨迹会越来越清晰。";
      if (streak.now >= 7) note = `连续 ${streak.now} 天，强度非常稳，继续保持这条节奏线。`;
      if (consistency >= 70) note = `本月坚持率 ${consistency}%！你正在把热爱做成长期习惯。`;
      if (checkins.length === 0) note = "第一条打卡会开启你的成长统计板。";
      document.getElementById("statsNote").textContent = note;
    }

    function readImageAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function bindUploadPreview() {
      const input = document.getElementById("imageUpload");
      const preview = document.getElementById("imagePreview");
      input.addEventListener("change", async () => {
        const file = input.files && input.files[0];
        if (!file) {
          latestImageData = "";
          preview.style.display = "none";
          return;
        }
        try {
          const url = await readImageAsDataUrl(file);
          latestImageData = url;
          preview.src = url;
          preview.style.display = "block";
        } catch (_) {
          latestImageData = "";
          preview.style.display = "none";
        }
      });
    }

    function tokenize(text) {
      if (!text) return [];
      const words = [];
      const chunks = String(text)
        .replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, " ")
        .split(/\s+/)
        .filter(Boolean);

      chunks.forEach((chunk) => {
        const lower = chunk.toLowerCase();
        if (/^[a-z]{3,}$/.test(lower) && !STOP_WORDS.has(lower)) {
          words.push(lower);
          return;
        }
        if (/^[\u4e00-\u9fa5]{2,}$/.test(chunk)) {
          if (chunk.length <= 4) {
            if (!STOP_WORDS.has(chunk)) words.push(chunk);
          } else {
            const mid = chunk.slice(0, 2);
            const tail = chunk.slice(2, 4);
            if (!STOP_WORDS.has(mid)) words.push(mid);
            if (!STOP_WORDS.has(tail)) words.push(tail);
          }
        }
      });
      return words;
    }

    function inRange(dateStr, mode) {
      const date = toDate(dateStr);
      const today = toDate(getTodayStr());
      const diff = Math.round((today - date) / 86400000);
      return mode === "year" ? diff <= 365 : diff <= 31;
    }

    function renderFrequencyCloud() {
      const cloud = document.getElementById("freqCloud");
      cloud.innerHTML = "";
      const checkins = loadCheckins().filter((item) => inRange(item.date, selectedCloudRange));

      if (!checkins.length) {
        const empty = document.createElement("div");
        empty.className = "cloud-empty";
        empty.textContent = "当前时间范围暂无记录，打卡后会自动生成频率图。";
        cloud.appendChild(empty);
        return;
      }

      const textFreq = new Map();
      const imgFreq = new Map();

      checkins.forEach((item) => {
        if (item.imageData) {
          const key = item.imageData.slice(0, 64);
          const obj = imgFreq.get(key) || { src: item.imageData, count: 0 };
          obj.count += 1;
          imgFreq.set(key, obj);
        } else {
          const sourceText = `${item.content || ""} ${item.passion || ""}`.trim();
          tokenize(sourceText).forEach((token) => {
            textFreq.set(token, (textFreq.get(token) || 0) + 1);
          });
        }
      });

      const words = [...textFreq.entries()]
        .sort((a, b) => b[1] - a[1])
        .slice(0, 26)
        .map(([text, count]) => ({ type: "word", text, count }));
      const stickers = [...imgFreq.values()]
        .sort((a, b) => b.count - a.count)
        .slice(0, 14)
        .map((item) => ({ type: "img", src: item.src, count: item.count }));
      const items = [...words, ...stickers];

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "cloud-empty";
        empty.textContent = "还缺少可提取的关键词，请补充一些打卡内容。";
        cloud.appendChild(empty);
        return;
      }

      const maxCount = Math.max(...items.map((i) => i.count));
      const rect = cloud.getBoundingClientRect();
      const placed = [];
      const maxWidth = Math.max(220, rect.width);
      const maxHeight = Math.max(120, rect.height);

      items.forEach((item, index) => {
        const weight = item.count / maxCount;
        const size = item.type === "word"
          ? Math.round(13 + weight * 22)
          : Math.round(24 + weight * 36);
        let width = item.type === "word" ? item.text.length * size * 0.58 : size;
        let height = item.type === "word" ? size + 6 : size;
        let x = 6;
        let y = 8;
        let ok = false;
        for (let attempt = 0; attempt < 40; attempt++) {
          x = Math.round(Math.random() * Math.max(1, maxWidth - width - 8));
          y = Math.round(Math.random() * Math.max(1, maxHeight - height - 8));
          const collide = placed.some((p) => !(x + width < p.x || p.x + p.w < x || y + height < p.y || p.y + p.h < y));
          if (!collide) {
            ok = true;
            break;
          }
        }
        if (!ok && index > 10) return;

        placed.push({ x, y, w: width, h: height });
        if (item.type === "word") {
          const el = document.createElement("span");
          el.className = "cloud-word";
          el.textContent = item.text;
          el.style.left = `${x}px`;
          el.style.top = `${y}px`;
          el.style.fontSize = `${size}px`;
          el.style.transform = `rotate(${(Math.random() * 14 - 7).toFixed(1)}deg)`;
          el.style.color = `hsl(${18 + Math.round(weight * 20)}, ${42 + Math.round(weight * 18)}%, ${32 + Math.round(weight * 15)}%)`;
          cloud.appendChild(el);
        } else {
          const img = document.createElement("img");
          img.className = "cloud-sticker";
          img.src = item.src;
          img.alt = "打卡贴纸";
          img.style.left = `${x}px`;
          img.style.top = `${y}px`;
          img.style.width = `${size}px`;
          img.style.height = `${size}px`;
          img.style.transform = `rotate(${(Math.random() * 16 - 8).toFixed(1)}deg)`;
          cloud.appendChild(img);
        }
      });
    }

    function bindCloudRange() {
      const toolbar = document.querySelectorAll(".history-toolbar button");
      toolbar.forEach((btn) => {
        btn.addEventListener("click", () => {
          selectedCloudRange = btn.dataset.range;
          toolbar.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          renderFrequencyCloud();
        });
      });
    }

    async function submitCheckin(event) {
      event.preventDefault();
      const passion = document.getElementById("passionName").value.trim();
      const content = document.getElementById("checkinContent").value.trim();
      const date = document.getElementById("checkinDate").value || getTodayStr();
      const duration = document.getElementById("duration").value;
      const button = document.getElementById("submitBtn");

      if (!passion) {
        alert("请填写热爱项目。");
        return;
      }
      if (!content) {
        alert("请填写打卡内容。");
        return;
      }
      if (existsCheckin(date)) {
        alert("该日期已经打过卡啦，请选择其他日期。");
        return;
      }

      const newRecord = {
        id: `${date}-${Date.now()}`,
        date,
        time: new Date().toLocaleString("zh-CN", { hour12: false }),
        passion,
        duration,
        durationLabel: getDurationLabel(duration),
        content,
        imageData: latestImageData
      };

      let checkins = await postCheckinToServer(newRecord);
      if (!checkins) {
        checkins = loadCheckins();
        checkins.push(newRecord);
        checkins.sort((a, b) => a.date.localeCompare(b.date));
        try {
          saveCheckins(checkins);
        } catch (_) {
          alert("打卡内容或图片过大，浏览器本地存储失败。建议缩小图片后重试。");
          return;
        }
      }

      const state = loadState();
      state.exp = Number(state.exp || 0) + 10;
      state.syncedExp = Number(state.syncedExp || state.exp || 0) + 10;
      state.streak = Number(state.streak || 0) + 1;
      state.passionCount = Number(state.passionCount || 0) + 1;
      state.dailyCheckinCount = Number(state.dailyCheckinCount || 0) + 1;
      state.logs = Array.isArray(state.logs) ? state.logs : [];
      const stamp = new Date().toLocaleString("zh-CN", { hour12: false });
      state.logs.push(`[${stamp}] 热爱打卡「${passion}」+10 EXP`);
      state.logs = state.logs.slice(-30);
      saveState(state);

      document.getElementById("checkinForm").reset();
      document.getElementById("imagePreview").style.display = "none";
      document.getElementById("checkinDate").value = getTodayStr();
      latestImageData = "";
      selectedDate = date;

      button.disabled = true;
      button.textContent = "✓ 打卡成功";
      setTimeout(() => {
        button.disabled = false;
        button.textContent = "❤️ 确认打卡（+10 EXP）";
      }, 900);

      renderCalendar();
      renderStats();
      renderFrequencyCloud();
      fireConfetti();
      showPetToast(true);
    }

    function fireConfetti() {
      const canvas = document.getElementById("confetti");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const particles = [];
      const colors = ["#e74c3c", "#ff6b9d", "#f5b24d", "#a66cf5", "#3ca0ff"];
      for (let i = 0; i < 68; i++) {
        particles.push({
          x: canvas.width / 2,
          y: canvas.height / 2,
          vx: (Math.random() - 0.5) * 12,
          vy: (Math.random() - 0.5) * 12 - 3,
          size: Math.random() * 7 + 4,
          color: colors[Math.floor(Math.random() * colors.length)]
        });
      }

      let frame = 0;
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.23;
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, p.size, p.size);
        });
        frame += 1;
        if (frame < 72) {
          requestAnimationFrame(animate);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      animate();
    }

    function showPetToast(fromCheckin) {
      const toast = document.getElementById("petToast");
      const checkins = loadCheckins();
      const streak = calcStreak(checkins);
      const total = checkins.length;
      const randomMsg = TOAST_MESSAGES[Math.floor(Math.random() * TOAST_MESSAGES.length)];
      const head = fromCheckin ? "打卡成功！" : "今日成长播报";
      const txt = `累计 ${total} 次，当前连击 ${streak.now} 天。${randomMsg}`;

      document.getElementById("petToastIcon").src = petStickerSvgs[Math.floor(Math.random() * petStickerSvgs.length)];
      document.getElementById("petToastTitle").textContent = head;
      document.getElementById("petToastText").textContent = txt;

      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 5000);
    }

    function startToastLoop() {
      showPetToast(false);
      clearInterval(toastInterval);
      toastInterval = setInterval(() => showPetToast(false), 12000);
    }

    function bindCalendarEvents() {
      document.getElementById("yearSelect").addEventListener("change", renderCalendar);
      document.getElementById("monthSelect").addEventListener("change", renderCalendar);
      document.getElementById("dayPicker").addEventListener("change", (e) => {
        if (!e.target.value) return;
        selectedDate = e.target.value;
        const date = toDate(selectedDate);
        document.getElementById("yearSelect").value = String(date.getFullYear());
        document.getElementById("monthSelect").value = String(date.getMonth() + 1);
        document.getElementById("checkinDate").value = selectedDate;
        renderCalendar();
      });
    }

    async function init() {
      await fetchServerCheckins();
      setupCalendarControls();
      bindCalendarEvents();
      bindCloudRange();
      bindUploadPreview();
      document.getElementById("checkinForm").addEventListener("submit", submitCheckin);

      renderCalendar();
      renderStats();
      renderFrequencyCloud();
      startToastLoop();
    }

    init();
  </script>
</body>
