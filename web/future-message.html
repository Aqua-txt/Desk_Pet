<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樱小宠 · 三年后的寄语</title>
  <style>
    :root {
      --bg: #fff9ef;
      --bg-soft: #fff3dc;
      --card: rgba(255, 255, 255, 0.86);
      --line: rgba(210, 171, 109, 0.26);
      --text: #4c3720;
      --muted: #8d7251;
      --accent: #d59a44;
      --accent-strong: #bf7d24;
      --good: #7cad63;
      --rose: #e2a67d;
      --shadow: 0 14px 30px rgba(180, 132, 67, 0.14);
      --radius: 16px;
      --purple: #8b5cf6;
      --purple-light: #a78bfa;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 460px at -10% -10%, rgba(255, 229, 176, 0.65), transparent 66%),
        radial-gradient(700px 360px at 110% 110%, rgba(255, 220, 169, 0.35), transparent 60%),
        linear-gradient(170deg, var(--bg), var(--bg-soft));
    }

    .header {
      background: linear-gradient(135deg, var(--purple), #6d28d9);
      color: white;
      padding: 28px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.5px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.25);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 10px 20px;
      border-radius: 11px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }

    .wrap {
      width: min(1180px, 93vw);
      margin: 26px auto 42px;
      display: grid;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 18px;
      font-size: 20px;
      color: var(--purple);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .message-display {
      background: linear-gradient(145deg, rgba(237, 233, 254, 0.95), rgba(221, 214, 254, 0.88));
      border: 2px solid rgba(139, 92, 246, 0.3);
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .message-display::before {
      content: '"';
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 80px;
      color: rgba(139, 92, 246, 0.15);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .message-display::after {
      content: '"';
      position: absolute;
      bottom: -20px;
      right: 20px;
      font-size: 80px;
      color: rgba(139, 92, 246, 0.15);
      font-family: Georgia, serif;
      line-height: 1;
    }

    .message-text {
      font-size: 22px;
      line-height: 1.85;
      color: #5b21b6;
      font-weight: 600;
      max-width: 700px;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.6s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-meta {
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    .generate-section {
      display: grid;
      gap: 16px;
      margin-top: 20px;
    }

    .generate-btn {
      background: linear-gradient(135deg, var(--purple-light), var(--purple));
      color: white;
      border: none;
      padding: 16px 36px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 28px rgba(139, 92, 246, 0.32);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 14px 36px rgba(139, 92, 246, 0.42);
    }

    .options-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .option-btn {
      flex: 1;
      min-width: 140px;
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: #6d28d9;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .option-btn:hover {
      background: rgba(139, 92, 246, 0.15);
      border-color: var(--purple);
      transform: translateY(-2px);
    }

    .option-btn.active {
      background: linear-gradient(135deg, var(--purple-light), var(--purple));
      color: white;
      border-color: transparent;
    }

    .saved-messages {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 480px;
      overflow-y: auto;
      display: grid;
      gap: 14px;
    }

    .saved-item {
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(248, 245, 255, 0.82));
      padding: 20px;
      transition: all 0.25s ease;
      position: relative;
    }

    .saved-item:hover {
      border-color: rgba(139, 92, 246, 0.4);
      transform: translateX(4px);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.12);
    }

    .saved-item-content {
      font-size: 16px;
      line-height: 1.75;
      color: #5b21b6;
      margin-bottom: 12px;
    }

    .saved-item-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px dashed rgba(139, 92, 246, 0.2);
    }

    .saved-item-time {
      font-size: 12px;
      color: var(--muted);
    }

    .saved-item-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      color: var(--purple);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: rgba(139, 92, 246, 0.2);
    }

    .action-btn.copy-btn:hover {
      background: rgba(124, 173, 99, 0.2);
      color: var(--good);
      border-color: rgba(124, 173, 99, 0.35);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: linear-gradient(145deg, rgba(237, 233, 254, 0.88), rgba(221, 214, 254, 0.78));
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--purple);
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, var(--good), #4a8c36);
      color: white;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .header h1 { font-size: 22px; }
      .message-text { font-size: 18px; }
      .options-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔮 三年后的寄语</h1>
    <a class="back-btn" href="index.html">← 返回主页</a>
  </div>

  <main class="wrap">
    <section class="card">
      <h2>✨ 来自未来的声音</h2>
      <div class="message-display" id="messageDisplay">
        <p class="message-text" id="currentMessage">点击下方按钮，让三年后的自己给你写一段话...</p>
        <p class="message-meta" id="messageMeta"></p>
      </div>

      <div class="generate-section">
        <button class="generate-btn" onclick="generateMessage()">
          🎲 生成新的未来寄语
        </button>
        <p style="text-align:center;font-size:13px;color:var(--muted);margin:8px 0;">选择寄语风格，获得更贴合你的内容：</p>
        <div class="options-row">
          <button class="option-btn active" data-style="general" onclick="setStyle(this)">💫 综合成长</button>
          <button class="option-btn" data-style="encourage" onclick="setStyle(this)">🌟 励志激励</button>
          <button class="option-btn" data-style="reflect" onclick="setStyle(this)">🤔 深度反思</button>
          <button class="option-btn" data-style="warm" onclick="setStyle(this)">💝 温暖治愈</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>📚 寄语收藏夹</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalSaved">0</div>
          <div class="stat-label">已保存寄语</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="favoriteCount">0</div>
          <div class="stat-label">收藏数量</div>
        </div>
      </div>
      <ul class="saved-messages" id="savedList"></ul>
    </section>
  </main>

  <div class="toast" id="toast">✓ 已复制到剪贴板</div>

  <script>
    const storeKey = "desk_pet_web_demo_state";
    const messageStoreKey = "desk_pet_future_messages";

    let currentStyle = 'general';

    const MESSAGE_TEMPLATES = {
      general: [
        '三年后的你会感谢现在的自己：在武大的每一个角落，你都在认真对待自己的热爱，那些看似微小的坚持，最终汇聚成了闪闪发光的轨迹。',
        '未来的你说：不要小看今天这一步。三年后，你会用持续行动证明——热爱不是口号，而是每天醒来后第一件想做的事。',
        '你已经在路上了。继续记录被忽视的角落，继续做你真正想做的事。时间会证明一切。',
        '三年后的你站在更高的地方回望，会发现今天的每一次打卡、每一篇记录、每一次思考，都是通往那个更好版本的台阶。'
      ],
      encourage: [
        '嘿，别怀疑自己！三年后的你已经做到了曾经不敢想象的事情。你比自己以为的更强大、更有韧性。保持这份勇气！',
        '记住：每一个伟大的成就，都始于一个不起眼的开始。你现在正在播种，三年后将是收获的季节！',
        '困难只是暂时的，但你的成长是永久的。三年后的你会感谢今天没有放弃的自己。加油！',
        '你的潜力远超想象。三年后当你回头看，会发现今天所有的挑战都变成了你最宝贵的财富。'
      ],
      reflect: [
        '如果三年后的你能和现在的你对话，他会说：慢一点也没关系，重要的是方向正确，而不是速度最快。你在做对的事。',
        '思考一下：三年后你想成为什么样的人？今天的每一个选择，都在为那个答案投票。',
        '真正的成长不是一蹴而就的，而是无数个平凡日子里的微小改变叠加而成。你在正确的轨道上。',
        '有时候走慢一点反而更快。花时间去感受、去记录、去思考——这些看似"无用"的事情，恰恰是最有价值的投资。'
      ],
      warm: [
        '亲爱的，无论今天过得怎么样，都要记得对自己好一点。三年后的你一定会感谢现在这个温柔对待自己的你。',
        '世界很大，但你不需要一次看完。慢慢来，享受沿途的风景。三年后的你会带着满满的回忆和温暖微笑。',
        '允许自己偶尔疲惫，允许自己暂时迷茫。重要的是，你从未停止前行。三年后的你，一定很为自己骄傲。',
        '每一个当下都是礼物。珍惜此刻的感受和想法，它们是独一无二的。三年后再读这些文字，你会感动得落泪。'
      ]
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(storeKey);
        if (!raw) return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
        return JSON.parse(raw);
      } catch (_) {
        return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
      }
    }

    function saveState(state) {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function loadMessages() {
      try {
        const raw = localStorage.getItem(messageStoreKey);
        if (!raw) return [];
        return JSON.parse(raw);
      } catch (_) {
        return [];
      }
    }

    function saveMessages(messages) {
      localStorage.setItem(messageStoreKey, JSON.stringify(messages));
    }

    function setStyle(btn) {
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentStyle = btn.dataset.style;
    }

    function generateMessage() {
      const templates = MESSAGE_TEMPLATES[currentStyle];
      const message = templates[Math.floor(Math.random() * templates.length)];

      document.getElementById('currentMessage').textContent = message;
      document.getElementById('currentMessage').style.animation = 'none';
      void document.getElementById('currentMessage').offsetWidth;
      document.getElementById('currentMessage').style.animation = 'fadeInUp 0.6s ease';

      const now = new Date();
      document.getElementById('messageMeta').textContent =
        `📅 ${now.toLocaleString('zh-CN', { hour12: false })} · 风格：${get_style_name(currentStyle)}`;

      const savedMsg = {
        id: Date.now(),
        message,
        style: currentStyle,
        styleName: get_style_name(currentStyle),
        time: now.toLocaleString('zh-CN', { hour12: false }),
        favorite: false
      };

      const messages = loadMessages();
      messages.push(savedMsg);
      saveMessages(messages);

      const state = loadState();
      state.futureCount += 1;
      const stamp = new Date().toLocaleString("zh-CN", { hour12: false });
      state.logs.push(`[${stamp}] 生成了一条新的三年后寄语`);
      state.logs = state.logs.slice(-26);
      saveState(state);

      renderSavedList();
      updateStats();
    }

    function get_style_name(style) {
      const names = {
        general: '综合成长',
        encourage: '励志激励',
        reflect: '深度反思',
        warm: '温暖治愈'
      };
      return names[style] || style;
    }

    function renderSavedList() {
      const messages = loadMessages();
      const list = document.getElementById('savedList');
      list.innerHTML = '';

      if (messages.length === 0) {
        list.innerHTML = `
          <li class="empty-state">
            <div class="icon">🔮</div>
            <p>还没有保存任何寄语</p>
            <p style="font-size:13px;margin-top:8px;">生成第一条来自未来的寄语吧！</p>
          </li>
        `;
        return;
      }

      messages.slice().reverse().forEach(msg => {
        const li = document.createElement('li');
        li.className = 'saved-item';
        li.innerHTML = `
          <div class="saved-item-content">${msg.message}</div>
          <div class="saved-item-footer">
            <span class="saved-item-time">${msg.time} · ${msg.styleName}</span>
            <div class="saved-item-actions">
              <button class="action-btn copy-btn" onclick="copyMessage(${msg.id})">📋 复制</button>
              <button class="action-btn" onclick="toggleFavorite(${msg.id})">${msg.favorite ? '⭐' : '☆'} ${msg.favorite ? '已收藏' : '收藏'}</button>
              <button class="action-btn" onclick="deleteMessage(${msg.id})">🗑️ 删除</button>
            </div>
          </div>
        `;
        list.appendChild(li);
      });
    }

    function updateStats() {
      const messages = loadMessages();
      document.getElementById('totalSaved').textContent = messages.length;
      document.getElementById('favoriteCount').textContent = messages.filter(m => m.favorite).length;
    }

    function copyMessage(id) {
      const messages = loadMessages();
      const msg = messages.find(m => m.id === id);
      if (msg) {
        navigator.clipboard.writeText(msg.message).then(() => {
          showToast('✓ 已复制到剪贴板');
        }).catch(() => {
          showToast('复制失败，请手动复制');
        });
      }
    }

    function toggleFavorite(id) {
      const messages = loadMessages();
      const msg = messages.find(m => m.id === id);
      if (msg) {
        msg.favorite = !msg.favorite;
        saveMessages(messages);
        renderSavedList();
        updateStats();
      }
    }

    function deleteMessage(id) {
      if (!confirm('确定要删除这条寄语吗？')) return;
      let messages = loadMessages();
      messages = messages.filter(m => m.id !== id);
      saveMessages(messages);
      renderSavedList();
      updateStats();
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function init() {
      renderSavedList();
      updateStats();

      const messages = loadMessages();
      if (messages.length > 0) {
        const latest = messages[messages.length - 1];
        document.getElementById('currentMessage').textContent = latest.message;
        document.getElementById('messageMeta').textContent =
          `📅 ${latest.time} · 风格：${latest.styleName}`;
      }
    }

    init();
  </script>
</body>
</html>
