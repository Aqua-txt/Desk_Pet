<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樱小宠 · 成长面板</title>
  <style>
    :root {
      --bg: #fff9ef;
      --bg-soft: #fff3dc;
      --card: rgba(255, 255, 255, 0.86);
      --line: rgba(210, 171, 109, 0.26);
      --text: #4c3720;
      --muted: #8d7251;
      --accent: #d59a44;
      --accent-strong: #bf7d24;
      --good: #7cad63;
      --rose: #e2a67d;
      --shadow: 0 14px 30px rgba(180, 132, 67, 0.14);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 460px at -10% -10%, rgba(255, 229, 176, 0.65), transparent 66%),
        radial-gradient(700px 360px at 110% 110%, rgba(255, 220, 169, 0.35), transparent 60%),
        linear-gradient(170deg, var(--bg), var(--bg-soft));
    }

    .header {
      background: linear-gradient(135deg, #dca14f, #c07f2a);
      color: white;
      padding: 28px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 24px rgba(191, 125, 36, 0.25);
    }

    .header h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0.5px;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.25);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 10px 20px;
      border-radius: 11px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.38);
      transform: translateY(-1px);
    }

    .wrap {
      width: min(1180px, 93vw);
      margin: 26px auto 42px;
      display: grid;
      gap: 16px;
      position: relative;
      z-index: 2;
    }

    .campus-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .campus-bg .campus-art {
      position: absolute;
      max-width: none;
      height: auto;
      mix-blend-mode: multiply;
      filter: sepia(1) hue-rotate(-8deg) saturate(0.52) brightness(1.08) contrast(0.86);
    }

    .campus-top {
      width: min(960px, 92vw);
      right: -130px;
      top: 8px;
      opacity: 0.28;
    }

    .campus-mid {
      width: min(760px, 76vw);
      left: -70px;
      top: 33vh;
      opacity: 0.24;
    }

    .campus-bottom {
      width: min(1020px, 98vw);
      left: -160px;
      bottom: -36px;
      opacity: 0.22;
    }

    .campus-side {
      width: min(540px, 56vw);
      right: -120px;
      top: 48vh;
      opacity: 0.17;
      transform: rotate(-2deg);
    }

    .campus-watermark {
      position: fixed;
      right: 24px;
      bottom: 14px;
      z-index: 1;
      color: rgba(140, 103, 53, 0.35);
      font-size: 12px;
      letter-spacing: 0.9px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      padding: 22px;
    }

    .card h2 {
      margin: 0 0 18px;
      font-size: 20px;
      color: var(--accent-strong);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: linear-gradient(145deg, rgba(255, 247, 228, 0.92), rgba(255, 236, 208, 0.78));
      border: 1px solid rgba(213, 154, 68, 0.22);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
    }

    .stat-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent-strong);
      margin: 6px 0;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .level-section {
      background: linear-gradient(135deg, rgba(220, 161, 79, 0.12), rgba(192, 127, 42, 0.08));
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .level-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .level-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-strong);
    }

    .level-badge {
      background: linear-gradient(120deg, #dca14f, #c07f2a);
      color: white;
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
    }

    .progress-bar-container {
      background: rgba(213, 154, 68, 0.16);
      border-radius: 999px;
      height: 24px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #e8c57d, #d6913d);
      transition: width 0.5s ease;
      border-radius: 999px;
      position: relative;
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
    }

    .timeline-list {
      list-style: none;
      margin: 0;
      padding: 0;
      max-height: 420px;
      overflow-y: auto;
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      border: 1px solid rgba(213, 154, 68, 0.2);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.74);
      padding: 14px 16px;
      line-height: 1.65;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: all 0.2s ease;
    }

    .timeline-item:hover {
      border-color: rgba(213, 154, 68, 0.4);
      background: rgba(255, 255, 255, 0.88);
    }

    .dot {
      width: 10px;
      height: 10px;
      margin-top: 6px;
      border-radius: 50%;
      flex: 0 0 10px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(213, 154, 68, 0.2);
    }

    .timeline-content {
      flex: 1;
    }

    .timeline-time {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .timeline-text {
      font-size: 14px;
      color: var(--text);
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .achievement-card {
      border: 1px dashed rgba(213, 154, 68, 0.35);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      background: linear-gradient(145deg, rgba(255, 247, 228, 0.72), rgba(255, 236, 208, 0.58));
      opacity: 0.5;
      transition: all 0.3s ease;
    }

    .achievement-card.unlocked {
      opacity: 1;
      border-style: solid;
      border-color: rgba(124, 173, 99, 0.45);
      background: linear-gradient(145deg, rgba(232, 245, 223, 0.85), rgba(214, 238, 196, 0.75));
    }

    .achievement-icon {
      font-size: 40px;
      margin-bottom: 8px;
    }

    .achievement-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }

    .achievement-desc {
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="campus-bg" aria-hidden="true">
    <img class="campus-art campus-top" src="../989e301b-5b69-49cd-ab7f-c58d8e046aac (1).svg" alt="">
    <img class="campus-art campus-mid" src="../04591c9c-f260-4c7d-a2ef-1740ab62fe83 (1).svg" alt="">
    <img class="campus-art campus-bottom" src="../b7844486-faf7-486f-901f-8ec7ffb7980c (1).svg" alt="">
    <img class="campus-art campus-side" src="../40958298-b788-4157-8ece-4ade4c787752 (1).svg" alt="">
  </div>

  <div class="campus-watermark">WUHAN UNIVERSITY · CAMPUS LINE ART</div>

  <div class="header">
    <h1>📊 樱小宠成长面板</h1>
    <a class="back-btn" href="index.html">← 返回主页</a>
  </div>

  <main class="wrap">
    <section class="card">
      <h2>📈 成长总览</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">⭐</div>
          <div class="stat-value" id="totalExp">0</div>
          <div class="stat-label">累计经验值</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎯</div>
          <div class="stat-value" id="currentLevel">Lv1</div>
          <div class="stat-label">当前等级</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔥</div>
          <div class="stat-value" id="streakDays">0</div>
          <div class="stat-label">连续打卡天数</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📍</div>
          <div class="stat-value" id="cornerTotal">0</div>
          <div class="stat-label">角落记录数</div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>🏆 等级进度</h2>
      <div class="level-section">
        <div class="level-header">
          <span class="level-title" id="levelTitle">初来乍到</span>
          <span class="level-badge" id="levelBadge">Lv 1</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar-fill" id="levelProgress" style="width: 0%">
            <span class="progress-text" id="progressText">0%</span>
          </div>
        </div>
        <p style="margin-top: 12px; color: var(--muted); font-size: 14px;" id="levelDesc">继续努力，积累更多经验值！</p>
      </div>
    </section>

    <section class="card">
      <h2>🕐 成长时间线</h2>
      <ul class="timeline-list" id="timelineList"></ul>
    </section>

    <section class="card">
      <h2>🏅 成就徽章</h2>
      <div class="achievement-grid" id="achievementGrid"></div>
    </section>
  </main>

  <script>
    const storeKey = "desk_pet_web_demo_state";
    const LEVELS = [
      { level: 1, title: "初来乍到", min: 0 },
      { level: 2, title: "有点期待", min: 30 },
      { level: 3, title: "热爱上头", min: 80 },
      { level: 4, title: "角落守护者", min: 150 },
      { level: 5, title: "未来引路人", min: 240 }
    ];

    const ACHIEVEMENTS = [
      { id: 'first_corner', name: '初次探索', desc: '记录第一个角落', icon: '🔍', condition: (s) => s.cornerCount >= 1 },
      { id: 'corner_5', name: '观察家', desc: '记录5个角落', icon: '👁️', condition: (s) => s.cornerCount >= 5 },
      { id: 'corner_10', name: '角落达人', desc: '记录10个角落', icon: '🗺️', condition: (s) => s.cornerCount >= 10 },
      { id: 'first_passion', name: '热爱萌芽', desc: '完成第一次打卡', icon: '💝', condition: (s) => s.passionCount >= 1 },
      { id: 'passion_5', name: '坚持的力量', desc: '完成5次热爱打卡', icon: '💪', condition: (s) => s.passionCount >= 5 },
      { id: 'streak_3', name: '三日连胜', desc: '连续打卡3天', icon: '🔥', condition: (s) => s.streak >= 3 },
      { id: 'streak_7', name: '周常达人', desc: '连续打卡7天', icon: '⚡', condition: (s) => s.streak >= 7 },
      { id: 'level_3', name: '进阶者', desc: '达到Lv3', icon: '🌟', condition: (s) => getLevelByExp(s.exp).level >= 3 },
      { id: 'future_3', name: '未来规划师', desc: '生成3条寄语', icon: '🔮', condition: (s) => s.futureCount >= 3 },
      { id: 'exp_100', name: '百点成就', desc: '累计100经验', icon: '💯', condition: (s) => s.exp >= 100 }
    ];

    function loadState() {
      try {
        const raw = localStorage.getItem(storeKey);
        if (!raw) return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
        return JSON.parse(raw);
      } catch (_) {
        return { exp: 0, streak: 0, cornerCount: 0, passionCount: 0, futureCount: 0, logs: [] };
      }
    }

    function getLevelByExp(exp) {
      let current = LEVELS[0];
      for (const lvl of LEVELS) {
        if (exp >= lvl.min) current = lvl;
      }
      return current;
    }

    function getNextLevel(exp) {
      const current = getLevelByExp(exp);
      return LEVELS.find((item) => item.level === current.level + 1) || null;
    }

    function renderPanel() {
      const state = loadState();
      const current = getLevelByExp(state.exp);
      const next = getNextLevel(state.exp);

      document.getElementById('totalExp').textContent = state.exp;
      document.getElementById('currentLevel').textContent = `Lv${current.level}`;
      document.getElementById('streakDays').textContent = state.streak;
      document.getElementById('cornerTotal').textContent = state.cornerCount;

      document.getElementById('levelTitle').textContent = current.title;
      document.getElementById('levelBadge').textContent = `Lv ${current.level}`;

      let percent = 0;
      if (next) {
        const range = Math.max(1, next.min - current.min);
        percent = Math.min(100, Math.round(((state.exp - current.min) / range) * 100));
        document.getElementById('levelDesc').textContent = `还需 ${next.min - state.exp} 经验升级到「${next.title}」`;
      } else {
        percent = 100;
        document.getElementById('levelDesc').textContent = '🎉 恭喜！你已经达到最高等级！';
      }

      const progressFill = document.getElementById('levelProgress');
      progressFill.style.width = `${percent}%`;
      document.getElementById('progressText').textContent = `${percent}%`;

      const timelineList = document.getElementById('timelineList');
      timelineList.innerHTML = '';
      if (state.logs && state.logs.length > 0) {
        state.logs.slice().reverse().forEach(log => {
          const li = document.createElement('li');
          li.className = 'timeline-item';
          li.innerHTML = `
            <span class="dot"></span>
            <div class="timeline-content">
              <div class="timeline-time">${log.match(/\[.*?\]/)?.[0] || ''}</div>
              <div class="timeline-text">${log.replace(/\[.*?\]\s*/, '')}</div>
            </div>
          `;
          timelineList.appendChild(li);
        });
      } else {
        timelineList.innerHTML = '<li style="text-align:center; color:var(--muted); padding:30px;">暂无成长记录，快去主页开始行动吧！</li>';
      }

      const achievementGrid = document.getElementById('achievementGrid');
      achievementGrid.innerHTML = '';
      ACHIEVEMENTS.forEach(ach => {
        const unlocked = ach.condition(state);
        const card = document.createElement('div');
        card.className = `achievement-card${unlocked ? ' unlocked' : ''}`;
        card.innerHTML = `
          <div class="achievement-icon">${ach.icon}</div>
          <div class="achievement-name">${unlocked ? ach.name : '???'}</div>
          <div class="achievement-desc">${unlocked ? ach.desc : '未解锁'}</div>
        `;
        achievementGrid.appendChild(card);
      });
    }

    renderPanel();
  </script>
</body>
</html>
